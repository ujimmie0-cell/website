<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vanitas | Bio</title>
    <!-- FontAwesome for Social Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --glow-color: rgba(255, 255, 255, 0.6);
            --text-main: #ffffff;
            --text-sub: rgba(255, 255, 255, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #000000; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--text-main);
            overflow: hidden;
            perspective: 1000px; 
        }

        /* Particle Canvas Background */
        #snowCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
        }

        /* Entry overlay gate to enable audio autoplay */
        .entry-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000000;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .entry-overlay span {
            font-size: 1.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 300;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }

        /* 3D Transform Wrapper */
        .wrapper-3d {
            width: 100%;
            max-width: 550px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            transform-style: preserve-3d;
            opacity: 0;
            transform: scale(0.95);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .wrapper-3d.loaded {
            opacity: 1;
            transform: scale(1);
        }

        /* Main Glassmorphism Bio Box Container */
        .bio-container {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transition: transform 0.1s ease-out;
            transform-style: preserve-3d;
        }

        /* Profile Header */
        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 24px;
            transform: translateZ(30px);
        }

        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .profile-info h1 {
            font-size: 2.2rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: -0.5px;
        }

        .sub-tag {
            color: var(--text-sub);
            font-size: 1.1rem;
            margin-top: 4px;
        }

        /* Description Bio Area */
        .bio-text {
            color: var(--text-sub);
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 30px;
            text-align: left;
            white-space: pre-line;
            transform: translateZ(20px);
        }

        @media (max-width: 500px) {
            .profile-header {
                flex-direction: column;
                text-align: center;
                align-items: center;
            }
            .bio-text {
                text-align: center;
            }
        }

        /* Social Icons Link Bar */
        .socials-bar {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 25px;
            transform: translateZ(25px);
        }

        .social-icon {
            color: #fff;
            font-size: 1.8rem;
            text-decoration: none;
            opacity: 0.85;
            transition: opacity 0.2s, filter 0.2s, transform 0.2s;
        }

        .social-icon:hover {
            opacity: 1;
            transform: scale(1.05);
            filter: drop-shadow(0 0 8px var(--glow-color));
        }

        /* Pizza Support Button */
        .pizza-button-container {
            display: flex;
            justify-content: center;
            transform: translateZ(20px);
        }

        .pizza-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            padding: 10px 24px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.2s, transform 0.2s, border 0.2s;
        }

        .pizza-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <!-- Autoplay Activation Overlay -->
    <div class="entry-overlay" id="entryOverlay">
        <span>click to view</span>
    </div>

    <!-- Snow Particle Canvas Background Structure -->
    <canvas id="snowCanvas"></canvas>

    <!-- Hidden audio streaming handling engine -->
    <audio id="audioStream" src="test/music.mp3" loop></audio>

    <!-- 3D Transform Framework Container -->
    <div class="wrapper-3d" id="tiltWrapper">
        
        <!-- Center Profile Frame Layer -->
        <div class="bio-container" id="bioContainer">
            <div class="profile-header">
                <img class="avatar" id="avatarImg" src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=150" alt="Avatar">
                <div class="profile-info">
                    <h1 id="usernameHeading">vanitas</h1>
                    <div class="sub-tag" id="subTag">@vanitas87</div>
                </div>
            </div>

            <!-- Bio Text Description Module -->
            <div class="bio-text" id="bioText">
                "We soon tire of living only for ourselves. It necessarily follows that we also need to die for something. That something used to be called a noble cause."
            </div>

            <!-- Social Media Routing Links -->
            <div class="socials-bar">
                <!-- Telegram -->
                <a class="social-icon" href="https://t.me/vanitas85" target="_blank" title="Telegram">
                    <i class="fa-brands fa-telegram"></i>
                </a>
                <!-- Element Matrix Client -->
                <a class="social-icon" href="https://matrix.to/#/@christ-vindicates:unredacted.org" target="_blank" title="Element">
                    <i class="fa-solid fa-circle-nodes"></i>
                </a>
                <!-- Cinny Chat Client -->
                <a class="social-icon" href="https://matrix.to/#/@christ-vindicates:unredacted.org" target="_blank" title="Cinny">
                    <i class="fa-solid fa-comments"></i>
                </a>
            </div>

            <!-- Pizza Donation System Anchor Link -->
            <div class="pizza-button-container">
                <a href="https://www.pizzahut.co.il" target="_blank" class="pizza-btn">
                    <i class="fa-solid fa-pizza-slice"></i> Buy me a Cheese Pizza!
                </a>
            </div>
        </div>

    </div>

    <!-- RUNTIME LOGIC SCRIPT ENGINE -->
    <script>
        const CONFIG = {
            avatarUrl: "test/pfp.png"
        };

        // Static Assets Mounting 
        document.getElementById('avatarImg').src = CONFIG.avatarUrl;

        // Audio Activation System Pipeline
        const audio = document.getElementById('audioStream');
        const entryOverlay = document.getElementById('entryOverlay');
        const wrapper = document.getElementById('tiltWrapper');

        entryOverlay.addEventListener('click', () => {
            entryOverlay.style.opacity = '0';
            entryOverlay.style.visibility = 'hidden';
            wrapper.classList.add('loaded');
			
			audio.volume = 0.45;
            
            // Execute non-visual audio stream contextual capture
            audio.play().catch(err => console.log("Audio playback failed: ", err));
        });

        /* ---- HTML5 Snow Canvas Particle Engine (Varied Sizes + Terminal Drag) ---- */
        const canvas = document.getElementById('snowCanvas');
        const ctx = canvas.getContext('2d');

        let particles = [];
        const maxParticles = 120;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.reset();
                // Randomize initial grid placement uniformly
                this.y = Math.random() * canvas.height;
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = -10;
                // Varying sizes (from tiny flakes to soft distinct particles)
                this.size = Math.random() * 3.5 + 0.5;
                // Speed scales logically with mass/size 
                this.baseSpeedY = Math.random() * 1.2 + 0.4;
                this.speedY = this.baseSpeedY;
                this.speedX = Math.random() * 0.4 - 0.2;
                // Physics-like fluid drag simulation parameters
                this.drag = 0.98; 
                this.swingAngle = Math.random() * Math.PI * 2;
                this.swingSpeed = Math.random() * 0.02 + 0.005;
            }

            update() {
                // Apply subtle lateral sway adjustments via sine calculation
                this.swingAngle += this.swingSpeed;
                let horizontalSway = Math.sin(this.swingAngle) * 0.2;

                // Move with calculated terminal velocity dampening
                this.speedY *= this.drag;
                if (this.speedY < this.baseSpeedY) this.speedY = this.baseSpeedY;

                this.y += this.speedY;
                this.x += this.speedX + horizontalSway;

                // Recycle particle system once bounds are broken
                if (this.y > canvas.height + 10 || this.x < -10 || this.x > canvas.width + 10) {
                    this.reset();
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                // Tiny flakes are given softer opacity for deeper layer depth perception
                ctx.fillStyle = `rgba(255, 255, 255, ${this.size > 2 ? 0.75 : 0.45})`;
                ctx.fill();
            }
        }

        // Initialize particle array
        for (let i = 0; i < maxParticles; i++) {
            particles.push(new Particle());
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        /* ---- Dynamic Mouse Parallax Matrix tracking Script ---- */
        const intensity = 12; 

        document.addEventListener('mousemove', (e) => {
            if (!wrapper.classList.contains('loaded')) return;
            const { clientX, clientY } = e;
            const { innerWidth, innerHeight } = window;

            const xPos = (clientX / innerWidth) - 0.5;
            const yPos = (clientY / innerHeight) - 0.5;

            const rotateX = (-yPos * intensity).toFixed(2);
            const rotateY = (xPos * intensity).toFixed(2);

            wrapper.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });

        document.addEventListener('mouseleave', () => {
            wrapper.style.transition = "transform 0.5s ease";
            wrapper.style.transform = `rotateX(0deg) rotateY(0deg)`;
        });

        document.addEventListener('mouseenter', () => {
            wrapper.style.transition = "transform 0.1s ease-out";
        });
    </script>
</body>
</html>
