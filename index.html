<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vanitas | Bio</title>
    <!-- FontAwesome for Social Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --glow-color: rgba(255, 255, 255, 0.6);
            --text-main: #ffffff;
            --text-sub: rgba(255, 255, 255, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #000000; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--text-main);
            overflow: hidden;
            perspective: 1000px; 
        }

        /* Background Layer Container */
        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000000;
            background-repeat: no-repeat;
            background-position: center center;
            background-size: cover;
            z-index: -4;
            pointer-events: none;
        }

        /* Falling Particles Layer */
        #snowCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -3;
            pointer-events: none;
        }

        /* Container wrapper housing programmatic beat translations */
        .gram-layer-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1);
            z-index: -1;
            pointer-events: none;
            will-change: transform;
            /* FIX: Applied blend mode here so it blends correctly across transformed boundaries */
            mix-blend-mode: difference;
        }

        /* Centered Image Layer */
        .gram-layer {
            max-width: 90vw;
            max-height: 90vh;
            display: block;
        }

        /* Entry overlay gate to enable audio autoplay */
        .entry-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000000;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .entry-overlay span {
            font-size: 1.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 300;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }

        /* 3D Transform Wrapper */
        .wrapper-3d {
            width: 100%;
            max-width: 550px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            transform-style: preserve-3d;
            opacity: 0;
            transform: scale(0.95);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .wrapper-3d.loaded {
            opacity: 1;
            transform: scale(1);
        }

        /* Main Bio Box Container */
        .bio-container {
            width: 100%;
            background: rgba(10, 10, 10, 0.95); 
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.9);
            transition: transform 0.1s ease-out;
            transform-style: preserve-3d;
        }

        /* Profile Header */
        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 24px;
            transform: translateZ(30px);
        }

        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .profile-info h1 {
            font-size: 2.2rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: -0.5px;
        }

        .sub-tag {
            color: var(--text-sub);
            font-size: 1.1rem;
            margin-top: 4px;
        }

        /* Description Bio Area */
        .bio-text {
            color: var(--text-sub);
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 30px;
            text-align: left;
            white-space: pre-line;
            transform: translateZ(20px);
        }

        @media (max-width: 500px) {
            .profile-header {
                flex-direction: column;
                text-align: center;
                align-items: center;
            }
            .bio-text {
                text-align: center;
            }
        }

        /* Social Icons Link Bar */
        .socials-bar {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 25px;
            transform: translateZ(25px);
        }

        .social-icon {
            color: #fff;
            font-size: 1.8rem;
            text-decoration: none;
            opacity: 0.85;
            transition: opacity 0.2s, filter 0.2s, transform 0.2s;
        }

        .social-icon:hover {
            opacity: 1;
            transform: scale(1.05);
            filter: drop-shadow(0 0 8px var(--glow-color));
        }

        /* Pizza Support Button */
        .pizza-button-container {
            display: flex;
            justify-content: center;
            transform: translateZ(20px);
        }

        .pizza-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            padding: 10px 24px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.2s, transform 0.2s, border 0.2s;
        }

        .pizza-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <!-- Autoplay Activation Overlay -->
    <div class="entry-overlay" id="entryOverlay">
        <span>click to view</span>
    </div>

    <!-- Visual Layer Environments -->
    <div class="bg-layer" id="bgLayer"></div>
    <canvas id="snowCanvas"></canvas>
    
    <!-- Animated container wrapper to preserve mix-blend-mode performance -->
    <div class="gram-layer-container" id="gramContainer">
        <img class="gram-layer" src="test/gram.png" alt="Gram Structure Layer">
    </div>

    <!-- Hidden audio streaming handling engine -->
    <audio id="audioStream" src="test/music.mp3" loop crossorigin="anonymous"></audio>

    <!-- 3D Transform Framework Container -->
    <div class="wrapper-3d" id="tiltWrapper">
        
        <!-- Center Profile Frame Layer -->
        <div class="bio-container" id="bioContainer">
            <div class="profile-header">
                <img class="avatar" id="avatarImg" src="" alt="Avatar">
                <div class="profile-info">
                    <h1 id="usernameHeading">vanitas</h1>
                    <div class="sub-tag" id="subTag">@vanitas87</div>
                </div>
            </div>

            <!-- Bio Text Description Module -->
            <div class="bio-text" id="bioText">
                "but the Lord laughs at the wicked,
                for he knows their day is coming." - Psalm 37:13
                
                dsc: @vanitas87
            </div>

            <!-- Social Media Routing Links -->
            <div class="socials-bar">
                <!-- Telegram -->
                <a class="social-icon" href="https://t.me/vanitas85" target="_blank" title="Telegram">
                    <i class="fa-brands fa-telegram"></i>
                </a>
                <!-- Element Matrix Client -->
                <a class="social-icon" href="https://matrix.to/#/@christ-vindicates:unredacted.org" target="_blank" title="Element">
                    <i class="fa-solid fa-circle-nodes"></i>
                </a>
                <!-- Cinny Chat Client -->
                <a class="social-icon" href="https://matrix.to/#/@christ-vindicates:unredacted.org" target="_blank" title="Cinny">
                    <i class="fa-solid fa-comments"></i>
                </a>
            </div>

            <!-- Pizza Donation System Anchor Link -->
            <div class="pizza-button-container">
                <a href="https://www.pizzahut.co.il" target="_blank" class="pizza-btn">
                    <i class="fa-solid fa-pizza-slice"></i> Buy me a Cheese Pizza!
                </a>
            </div>
        </div>

    </div>

    <!-- RUNTIME LOGIC SCRIPT ENGINE -->
    <script>
        const CONFIG = {
            avatarUrl: "test/pfp.png",
            bgUrl: "test/bg.png"
        };

        // Static Assets Mounting 
        document.getElementById('avatarImg').src = CONFIG.avatarUrl;
        document.getElementById('bgLayer').style.backgroundImage = `url(${CONFIG.bgUrl})`;

        // Visual Layout Element Targets
        const audio = document.getElementById('audioStream');
        const entryOverlay = document.getElementById('entryOverlay');
        const wrapper = document.getElementById('tiltWrapper');
        const gramContainer = document.getElementById('gramContainer');

        /* ---- Real-Time AudioContext Analyzer Node Setup ---- */
        let audioCtx, analyser, dataArray;
        let isAudioInitialized = false;

        function initAudioTracker() {
            if (isAudioInitialized) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                
                const source = audioCtx.createMediaElementSource(audio);
                source.connect(analyser);
                analyser.connect(audioCtx.destination);
                
                analyser.fftSize = 64;
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                isAudioInitialized = true;
            } catch (e) {
                console.error("Audio initialization blocked:", e);
            }
        }

        entryOverlay.addEventListener('click', () => {
            entryOverlay.style.opacity = '0';
            entryOverlay.style.visibility = 'hidden';
            wrapper.classList.add('loaded');
			
            initAudioTracker();
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            audio.volume = 0.45;
            audio.play().catch(err => console.log("Audio playback failed: ", err));
        });

        /* ---- HTML5 Snow Canvas Particle Engine ---- */
        const canvas = document.getElementById('snowCanvas');
        const ctx = canvas.getContext('2d');

        let particles = [];
        const maxParticles = 240; 

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.reset();
                this.y = Math.random() * canvas.height;
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = -10;
                this.size = Math.random() * 3.5 + 0.5;
                this.baseSpeedY = Math.random() * 1.2 + 0.4;
                this.speedY = this.baseSpeedY;
                this.speedX = Math.random() * 0.4 - 0.2;
                this.drag = 0.98; 
                this.swingAngle = Math.random() * Math.PI * 2;
                this.swingSpeed = Math.random() * 0.02 + 0.005;
            }

            update() {
                this.swingAngle += this.swingSpeed;
                let horizontalSway = Math.sin(this.swingAngle) * 0.2;

                this.speedY *= this.drag;
                if (this.speedY < this.baseSpeedY) this.speedY = this.baseSpeedY;

                this.y += this.speedY;
                this.x += this.speedX + horizontalSway;

                if (this.y > canvas.height + 10 || this.x < -10 || this.x > canvas.width + 10) {
                    this.reset();
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${this.size > 2 ? 0.85 : 0.55})`;
                ctx.fill();
            }
        }

        for (let i = 0; i < maxParticles; i++) {
            particles.push(new Particle());
        }

        /* ---- Unified Animation Frame Rendering Loop ---- */
        let currentScale = 1;

        function renderLoop() {
            // Draw Snow Particles
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }

            let targetScale = 1.0;

            // Real-Time Audio Frequency Amplitude Detection
            if (isAudioInitialized && !audio.paused) {
                analyser.getByteFrequencyData(dataArray);
                let bassTotal = 0;
                for (let i = 0; i < 4; i++) {
                    bassTotal += dataArray[i];
                }
                let rawBassVal = bassTotal / 4;
                
                targetScale = 1.0 + (rawBassVal / 255) * 0.15;
            }

            // Linear interpolation easing equations for dynamic scale updates
            currentScale += (targetScale - currentScale) * 0.25;
            gramContainer.style.transform = `translate(-50%, -50%) scale(${currentScale})`;

            requestAnimationFrame(renderLoop);
        }
        renderLoop();

        /* ---- Dynamic Mouse Parallax Module ---- */
        const intensity = 12; 

        document.addEventListener('mousemove', (e) => {
            if (!wrapper.classList.contains('loaded')) return;
            const { clientX, clientY } = e;
            const { innerWidth, innerHeight } = window;

            const xPos = (clientX / innerWidth) - 0.5;
            const yPos = (clientY / innerHeight) - 0.5;

            const rotateX = (-yPos * intensity).toFixed(2);
            const rotateY = (xPos * intensity).toFixed(2);

            wrapper.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });

        document.addEventListener('mouseleave', () => {
            wrapper.style.transition = "transform 0.5s ease";
            wrapper.style.transform = `rotateX(0deg) rotateY(0deg)`;
        });

        document.addEventListener('mouseenter', () => {
            wrapper.style.transition = "transform 0.1s ease-out";
        });
    </script>
</body>
</html>
